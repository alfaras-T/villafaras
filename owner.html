<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>掲載希望のお問い合わせ｜villafaras（ヴィラファラス）</title>
<meta name="description" content="villafarasへの施設掲載をご検討のオーナー様・運営会社様向けのお問い合わせフォームです。">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800;900&family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--o1:#FF6B2B;--o2:#FF8A3D;--o3:#FFB347;--o-pale:#FFF4ED;--o-soft:#FFE8D6;--ink:#2A1A10;--ink2:#5C4434;--muted:#A88C78;--cream:#FFFBF7;--border:#F0E2D5;--white:#FFF}
body{font-family:'Noto Sans JP','Poppins',sans-serif;background:var(--cream);color:var(--ink);line-height:1.7}
header{background:linear-gradient(90deg,var(--o1),var(--o2));padding:14px 24px}
header a{color:white;text-decoration:none;font-weight:700;font-size:14px}
.wrap{max-width:560px;margin:0 auto;padding:40px 24px 60px}
.page-title{font-family:'Poppins','Noto Sans JP',sans-serif;font-size:clamp(20px,4vw,26px);font-weight:800;color:var(--ink);text-align:center;margin-bottom:28px}
form{background:var(--white);border:1px solid var(--border);border-radius:18px;padding:26px 22px}
.field{margin-bottom:16px}
.field label{display:block;font-size:13px;font-weight:700;color:var(--ink2);margin-bottom:6px}
.field .req{color:var(--o1);font-size:11px;margin-left:4px}
.field input,.field select,.field textarea{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;background:var(--cream);color:var(--ink)}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--o2)}
.field textarea{resize:vertical;min-height:100px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:480px){.field-row{grid-template-columns:1fr}}
.submit-btn{width:100%;padding:15px;border:none;border-radius:12px;background:linear-gradient(90deg,var(--o1),var(--o2));color:#fff;font-size:15px;font-weight:800;cursor:pointer;margin-top:6px}
.submit-btn:hover{opacity:.92}
.privacy-note{font-size:11.5px;color:var(--muted);margin-top:10px;line-height:1.6}
.back-link{display:block;text-align:center;margin-top:28px;color:var(--o1);text-decoration:none;font-weight:700;font-size:14px}
footer{text-align:center;padding:24px 16px;color:var(--muted);font-size:12px;line-height:1.7;word-break:break-word;overflow-wrap:break-word}
</style>
</head>
<body>
<header><a href="index.html">← villafaras（ヴィラファラス）トップに戻る</a></header>

<div class="wrap">
  <h1 class="page-title">掲載希望のお問い合わせ</h1>

  <form action="https://formsubmit.co/owner-request@example.com" method="POST">
    <input type="hidden" name="_subject" value="【villafaras】施設掲載のお問い合わせ">
    <input type="hidden" name="_captcha" value="true">
    <input type="hidden" name="_template" value="table">

    <div class="field-row">
      <div class="field"><label>お名前・ご担当者名<span class="req">必須</span></label><input type="text" name="お名前" required></div>
      <div class="field"><label>会社名・屋号</label><input type="text" name="会社名"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>メールアドレス<span class="req">必須</span></label><input type="email" name="メールアドレス" required></div>
      <div class="field"><label>電話番号</label><input type="tel" name="電話番号"></div>
    </div>
    <div class="field"><label>施設名<span class="req">必須</span></label><input type="text" name="施設名" required></div>
    <div class="field-row">
      <div class="field"><label>都道府県<span class="req">必須</span></label>
        <select name="都道府県" required>
          <option value="">選択してください</option>
          <option>千葉県</option><option>山梨県</option><option>神奈川県</option><option>静岡県</option>
          <option>長野県</option><option>栃木県</option><option>茨城県</option><option>群馬県</option><option>埼玉県</option>
          <option>その他</option>
        </select>
      </div>
      <div class="field"><label>施設の公式サイトURL</label><input type="url" name="公式サイトURL" placeholder="https://"></div>
    </div>
    <div class="field"><label>お問い合わせ内容<span class="req">必須</span></label><textarea name="お問い合わせ内容" required placeholder="施設の特徴、ご希望の掲載時期など、自由にご記入ください"></textarea></div>

    <button type="submit" class="submit-btn">送信する</button>
    <p class="privacy-note">送信いただいた内容は、掲載可否のご案内以外の目的には使用いたしません。<br>※現在は仮の送信先設定です。正式なメールアドレス確定後に差し替えます。</p>
  </form>

  <a class="back-link" href="index.html">← villafaras（ヴィラファラス）トップに戻る</a>
</div>

<footer>villafaras（ヴィラファラス）<br>サウナ・温泉付き一棟貸しヴィラ検索</footer>
</body>
</html>
